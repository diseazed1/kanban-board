name: Deploy to Fly.io

# Deploy ONLY on pushes to main — never on pull requests
# (PRs should be reviewed and merged before deployment)
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: true   # cancel a queued deploy if a newer commit arrives

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: Health check
        run: |
          echo "Waiting 15 seconds for the machine to start..."
          sleep 15
          curl --fail --retry 3 --retry-delay 5 \
               https://kanban-board-jpqmhg.fly.dev/health \
          || (echo "Health check failed" && exit 1)
