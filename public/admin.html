<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Kanban Board</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; color: #2c3e50; }

        /* Header */
        header {
            background: #2c3e50; color: white; padding: 0.75rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        header h1 { font-size: 1.2rem; }
        .header-nav { display: flex; gap: 0.75rem; align-items: center; }

        /* Layout */
        .admin-container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .section {
            background: white; border-radius: 10px; padding: 1.5rem;
            margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid #eee;
        }
        .section-header h2 { font-size: 1.1rem; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th { text-align: left; padding: 0.6rem 0.75rem; background: #f8f9fa; font-weight: 600; border-bottom: 2px solid #eee; }
        td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        /* Buttons */
        .btn {
            display: inline-block; padding: 0.4rem 0.8rem; border: none;
            border-radius: 5px; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary   { background: #3498db; color: white; }
        .btn-success   { background: #27ae60; color: white; }
        .btn-danger    { background: #e74c3c; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-warning   { background: #f39c12; color: white; }

        /* Badges */
        .badge {
            display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        }
        .badge.admin   { background: #fde8e8; color: #c0392b; }
        .badge.user    { background: #d5f5e3; color: #1e8449; }
        .badge.viewer  { background: #e8f4fd; color: #2980b9; }
        .badge.active  { background: #d5f5e3; color: #1e8449; }
        .badge.inactive{ background: #f0f0f0; color: #7f8c8d; }

        /* Forms */
        .form-inline { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .form-inline input, .form-inline select {
            padding: 0.5rem 0.75rem; border: 1px solid #ddd; border-radius: 5px;
            font-size: 0.875rem;
        }
        .form-inline input:focus, .form-inline select:focus { outline: none; border-color: #3498db; }

        /* Alerts */
        .alert { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.875rem; }
        .alert-error   { background: #fde8e8; color: #c0392b; }
        .alert-success { background: #d5f5e3; color: #1e8449; }

        /* Pagination */
        .pagination { display: flex; gap: 0.5rem; align-items: center; margin-top: 1rem; }

        /* Empty state */
        .empty-state { text-align: center; padding: 2rem; color: #95a5a6; font-style: italic; }

        /* Access denied */
        #access-denied { display: none; text-align: center; padding: 4rem; }
    </style>
</head>
<body>

<header>
    <h1>Admin Dashboard</h1>
    <div class="header-nav">
        <span id="admin-user-badge" style="font-size:0.85rem;opacity:0.8;"></span>
        <a href="/" class="btn btn-secondary">← Board</a>
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
    </div>
</header>

<div id="access-denied">
    <h2>Access Denied</h2>
    <p>You must be an admin to view this page.</p>
    <a href="/" class="btn btn-primary" style="margin-top:1rem;">Go to Board</a>
</div>

<div class="admin-container" id="admin-content" style="display:none;">

    <!-- ------------------------------------------------------------------ -->
    <!-- User Management                                                       -->
    <!-- ------------------------------------------------------------------ -->
    <div class="section">
        <div class="section-header">
            <h2>User Management</h2>
            <span id="user-count" style="font-size:0.85rem;color:#7f8c8d;"></span>
        </div>
        <div id="user-alert" class="alert" style="display:none;"></div>
        <table id="userTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Last Login</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ------------------------------------------------------------------ -->
    <!-- Invite Users                                                          -->
    <!-- ------------------------------------------------------------------ -->
    <div class="section">
        <div class="section-header">
            <h2>Invite Users</h2>
        </div>
        <div id="invite-alert" class="alert" style="display:none;"></div>
        <form class="form-inline" id="inviteForm">
            <input type="email" name="email" placeholder="user@example.com" required style="min-width:260px;">
            <button type="submit" class="btn btn-primary">Send Invite</button>
        </form>

        <h3 style="margin-top:1.5rem;margin-bottom:0.75rem;font-size:0.95rem;">Pending Invites</h3>
        <table id="inviteTable">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Invited By</th>
                    <th>Expires</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ------------------------------------------------------------------ -->
    <!-- Audit Log                                                             -->
    <!-- ------------------------------------------------------------------ -->
    <div class="section">
        <div class="section-header">
            <h2>Audit Log</h2>
            <div class="pagination">
                <button class="btn btn-secondary" id="auditPrev" disabled>← Prev</button>
                <span id="auditPage" style="font-size:0.85rem;"></span>
                <button class="btn btn-secondary" id="auditNext">Next →</button>
            </div>
        </div>
        <table id="auditTable">
            <thead>
                <tr>
                    <th>Action</th>
                    <th>User</th>
                    <th>IP Address</th>
                    <th>Details</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>
// ============================================================================
// State
// ============================================================================
let currentUser  = null;
let auditOffset  = 0;
const AUDIT_LIMIT = 50;

// ============================================================================
// API helper
// ============================================================================
async function api(method, path, body) {
    const opts = { method, credentials: 'include', headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);

    const res  = await fetch(path, opts);
    const data = await res.json().catch(() => ({}));

    if (res.status === 401) { window.location.href = '/'; return null; }
    if (res.status === 403) { showAccessDenied(); return null; }
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
}

function showAccessDenied() {
    document.getElementById('access-denied').style.display = 'block';
    document.getElementById('admin-content').style.display = 'none';
}

function showAlert(containerId, message, type = 'error') {
    const el = document.getElementById(containerId);
    el.textContent   = message;
    el.className     = `alert alert-${type}`;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// ============================================================================
// Bootstrap
// ============================================================================
(async () => {
    const me = await fetch('/api/auth/me', { credentials: 'include' });
    if (!me.ok) { window.location.href = '/'; return; }

    currentUser = await me.json();

    if (currentUser.role !== 'admin') { showAccessDenied(); return; }

    document.getElementById('admin-user-badge').textContent = currentUser.username;
    document.getElementById('admin-content').style.display = 'block';

    await Promise.all([loadUsers(), loadInvites().catch(e => { console.error('loadInvites error:', e.message); }), loadAuditLog()]);
})();

// ============================================================================
// Logout
// ============================================================================
document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
    window.location.href = '/';
});

// ============================================================================
// Users
// ============================================================================
async function loadUsers() {
    const users = await api('GET', '/api/admin/users');
    if (!users) return;

    document.getElementById('user-count').textContent = `${users.length} user${users.length !== 1 ? 's' : ''}`;

    const tbody = document.querySelector('#userTable tbody');
    if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No users found.</td></tr>';
        return;
    }

    tbody.innerHTML = users.map(u => `
        <tr data-user-id="${u.id}">
            <td>${u.id}</td>
            <td><strong>${escapeHtml(u.username)}</strong></td>
            <td>${escapeHtml(u.email)}</td>
            <td>
                <select class="role-select" data-user-id="${u.id}" ${u.id === currentUser.id ? 'disabled' : ''}>
                    <option value="admin"  ${u.role === 'admin'  ? 'selected' : ''}>Admin</option>
                    <option value="user"   ${u.role === 'user'   ? 'selected' : ''}>User</option>
                    <option value="viewer" ${u.role === 'viewer' ? 'selected' : ''}>Viewer</option>
                </select>
            </td>
            <td><span class="badge ${u.is_active ? 'active' : 'inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
            <td>${u.last_login ? new Date(u.last_login).toLocaleString() : '—'}</td>
            <td>
                ${u.id !== currentUser.id ? `
                    <button class="btn btn-warning save-role-btn" data-user-id="${u.id}">Save Role</button>
                    <button class="btn btn-primary reset-pw-btn" data-user-id="${u.id}" data-username="${escapeHtml(u.username)}">Reset PW</button>
                    <button class="btn ${u.is_active ? 'btn-secondary' : 'btn-success'} toggle-status-btn"
                            data-user-id="${u.id}" data-active="${u.is_active}">
                        ${u.is_active ? 'Deactivate' : 'Activate'}
                    </button>
                    <button class="btn btn-danger delete-user-btn" data-user-id="${u.id}" data-username="${escapeHtml(u.username)}">
                        Delete
                    </button>
                ` : '<em style="color:#7f8c8d;font-size:0.8rem;">(you)</em>'
            </td>
        </tr>
    `).join('');

    // Wire up action buttons
    tbody.querySelectorAll('.save-role-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const userId = parseInt(btn.dataset.userId, 10);
            const role   = tbody.querySelector(`.role-select[data-user-id="${userId}"]`).value;
            try {
                await api('PUT', `/api/admin/users/${userId}`, { role });
                showAlert('user-alert', `Role updated successfully.`, 'success');
                await loadUsers();
            } catch (err) {
                showAlert('user-alert', err.message);
            }
        });
    });

    tbody.querySelectorAll('.toggle-status-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const userId   = parseInt(btn.dataset.userId, 10);
            const isActive = btn.dataset.active === 'true';
            if (!confirm(`${isActive ? 'Deactivate' : 'Activate'} this user?`)) return;
            try {
                await api('PUT', `/api/admin/users/${userId}`, { is_active: !isActive });
                showAlert('user-alert', `User ${isActive ? 'deactivated' : 'activated'}.`, 'success');
                await loadUsers();
            } catch (err) {
                showAlert('user-alert', err.message);
            }
        });
    });

    tbody.querySelectorAll('.delete-user-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const userId   = parseInt(btn.dataset.userId, 10);
            const username = btn.dataset.username;
            if (!confirm(`Permanently delete user "${username}"? This cannot be undone.`)) return;
            try {
                await api('DELETE', `/api/admin/users/${userId}`);
                showAlert('user-alert', `User "${username}" deleted.`, 'success');
                await loadUsers();
            } catch (err) {
                showAlert('user-alert', err.message);
            }
        });
    });

    // Reset Password buttons
    tbody.querySelectorAll('.reset-pw-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const userId   = parseInt(btn.dataset.userId, 10);
            const username = btn.dataset.username;
            const newPw    = prompt(`Enter a new password for user "${username}" (min 8 characters):`);
            if (!newPw) return;
            if (newPw.length < 8) {
                showAlert('user-alert', 'Password must be at least 8 characters.');
                return;
            }
            try {
                await api('POST', `/api/admin/users/${userId}/reset-password`, { new_password: newPw });
                showAlert('user-alert', `Password reset successfully for "${username}".`, 'success');
            } catch (err) {
                showAlert('user-alert', err.message);
            }
        });
    });
}

// ============================================================================
// Invites
// ============================================================================
async function loadInvites() {
    const invites = await api('GET', '/api/admin/invits').catch(() => []);
    if (!Array.isArray(invites)) return;

    const tbody = document.querySelector('#inviteTable tbody');
    if (invites.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No pending invites.</td></tr>';
        return;
    }

    tbody.innerHTML = invites.map(inv => `
        <tr>
            <td>${escapeHtml(inv.email)}</td>
            <td>${escapeHtml(inv.invited_by_username || '—')}</td>
            <td>${new Date(inv.expires_at).toLocaleString()}</td>
            <td>
                <button class="btn btn-danger revoke-invite-btn" data-token="${inv.token}">Revoke</button>
            </td>
        </tr>
    `).join('');

    tbody.querySelectorAll('.revoke-invite-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            if (!confirm('Revoke this invite?')) return;
            try {
                await api('DELETE', `/api/admin/invites/${btn.dataset.token}`);
                showAlert('invite-alert', 'Invite revoked.', 'success');
                await loadInvites();
            } catch (err) {
                showAlert('invite-alert', err.message);
            }
        });
    });
}

document.getElementById('inviteForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = e.target.email.value.trim();

    try {
        const result = await api('POST', '/api/admin/invites/send', { email });
        if (!result) return;
        showAlert('invite-alert', `Invite sent to ${result.sent_to}. Expires: ${new Date(result.expires_at).toLocaleString()}`, 'success');
        e.target.reset();
        await loadInvites();
    } catch (err) {
        showAlert('invite-alert', err.message);
    }
});

// ============================================================================
// Audit Log
// ============================================================================
async function loadAuditLog() {
    const data = await api('GET', `/api/admin/audit-log?limit=${AUDIT_LIMIT}&offset=${auditOffset}`);
    if (!data) return;

    const { entries, total } = data;
    const page    = Math.floor(auditOffset / AUDIT_LIMIT) + 1;
    const maxPage = Math.ceil(total / AUDIT_LIMIT);

    document.getElementById('auditPage').textContent = `Page ${page} of ${maxPage} (${total} entries)`;
    document.getElementById('auditPrev').disabled = auditOffset === 0;
    document.getElementById('auditNext').disabled = auditOffset + AUDIT_LIMIT >= total;

    const tbody = document.querySelector('#auditTable tbody');
    if (entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No audit log entries.</td></tr>';
        return;
    }

    tbody.innerHTML = entries.map(e => `
        <tr>
            <td><code>${escapeHtml(e.action)}</code></td>
            <td>${escapeHtml(e.username || String(e.user_id || '—'))}</td>
            <td>${escapeHtml(e.ip_address || '—')}</td>
            <td><small style="color:#7f8c8d;">${escapeHtml(JSON.stringify(e.metadata || {}))}</small></td>
            <td>${new Date(e.created_at).toLocaleString()}</td>
        </tr>
    `).join('');
}

document.getElementById('auditPrev').addEventListener('click', async () => {
    auditOffset = Math.max(0, auditOffset - AUDIT_LIMIT);
    await loadAuditLog();
});
document.getElementById('auditNext').addEventListener('click', async () => {
    auditOffset += AUDIT_LIMIT;
    await loadAuditLog();
});

// ============================================================================
// Utilities
// ============================================================================
function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = String(text ?? '');
    return d.innerHTML;
}
</script>
</body>
</html>
